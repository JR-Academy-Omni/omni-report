name: Routine → Marketing Tasks (cron)

# 见 PRD_AI_VISIBILITY.md § 9 + PRD_MARKETING_TASKS_CI_SYNC.md
# 周报产出后自动跑 to-tasks 脚本，把推荐行动转成 marketing-tasks/active/ 卡。
# 卡产生后 sync-marketing-tasks.yml 监听 active/**/*.md push 自动同步到 prod Mongo。

on:
  # ⏸️ 全部 routine-to-tasks cron 已 DISABLED 2026-05-09 by user
  # 当前 active/ 战略聚焦 GEO + 小红书 两条流水线，其他 routine（ai-visibility /
  # competitor / marketing-topics / growth-playbook）一律不自动产任务卡。
  # 周报本身按各自 routine 跑，但不再转任务进 active/。
  # 重启某条：反注释下方对应 cron 行 + 删 scripts/<name>-to-tasks.ts 里的 process.exit 守卫。
  schedule: []
  # 历史 cron（暂停，留作记录）：
  #   - cron: '30 23 * * 2'   # ai-visibility 周三 09:30 Brisbane (DISABLED 2026-05-08)
  #   - cron: '0 11 * * 0'    # competitor 周日 21:00 Brisbane (DISABLED 2026-05-09)
  workflow_dispatch:
    inputs:
      routine:
        description: '跑哪个 routine（默认 all）'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ai-visibility
          - competitor

concurrency:
  group: routine-to-tasks
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run to-tasks scripts
        env:
          ROUTINE: ${{ github.event.inputs.routine || 'all' }}
        run: |
          set -e
          shopt -s nocaseglob

          # 决定跑哪些脚本
          # ⏸️ ai-visibility-to-tasks DISABLED 2026-05-08 by user — script self-exits early
          if [[ "$ROUTINE" == "ai-visibility" ]]; then
            echo "::warning::ai-visibility-to-tasks is DISABLED — see scripts/ai-visibility-to-tasks.ts top comment"
          fi
          # if [[ "$ROUTINE" == "ai-visibility" || "$ROUTINE" == "all" ]]; then
          #   echo "::group::ai-visibility-to-tasks"
          #   bun run scripts/ai-visibility-to-tasks.ts || echo "::warning::ai-visibility-to-tasks failed (non-fatal)"
          #   echo "::endgroup::"
          # fi

          # ⏸️ competitor-to-tasks DISABLED 2026-05-09 by user — script self-exits early
          if [[ "$ROUTINE" == "competitor" ]]; then
            echo "::warning::competitor-to-tasks is DISABLED — see scripts/competitor-to-tasks.ts top comment"
          fi
          # if [[ "$ROUTINE" == "competitor" || "$ROUTINE" == "all" ]]; then
          #   echo "::group::competitor-to-tasks"
          #   bun run scripts/competitor-to-tasks.ts || echo "::warning::competitor-to-tasks failed (non-fatal)"
          #   echo "::endgroup::"
          # fi

          # 全部 4 条 routine（ai-visibility / competitor / marketing-topics / growth-playbook）
          # 已被用户 disabled — 见各自 scripts/<name>-to-tasks.ts 顶部注释。
          # 当前阶段 marketing-tasks active/ 仅接收 GEO + 小红书 两条流水线产出。
          echo "::notice::All routine-to-tasks scripts disabled. active/ only accepts geo-* and xhs-* cards now."

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet marketing-tasks/active/; then
            echo "No new task cards generated."
            exit 0
          fi

          git add marketing-tasks/active/
          git commit -m "chore(routines): cron-generated task cards from $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
